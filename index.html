        .box3 {

        }

        .box14 {

            background-color: #FFFFFF;
        }

        .box18 {
            background-color: #3A86FF;
        }


        .box19 {
            background-color: #0A192F;
        }

        .box20 {
            background-color: #64FFDA;
        }

        .box21 {
            background-color: #8892B0;
        }
    </style>
</head>

<body>
    <div class="container">

    <div class="container">
